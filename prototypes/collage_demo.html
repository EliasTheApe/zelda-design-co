<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZELDA Design Co. — Collage Layout</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #fdfaf5;
    --ink:   #1a1714;
    --gold:  #b89a6e;
    --dark:  #171410;
  }

  body {
    background: var(--cream);
    font-family: 'Cormorant Garamond', Georgia, serif;
    overflow-x: hidden;
  }

  /* ── PAGE ── */
  .page {
    position: relative;
    width: 100%;
    max-width: 1440px;
    margin: 0 auto;
  }

  /* ── SECTION BANDS ── */
  .band {
    position: relative;
    border-top: 1px solid rgba(0,0,0,0.06);
  }
  .band-lbl {
    position: absolute;
    top: 22px; left: 28px;
    font-size: 9px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    font-weight: 300;
    user-select: none;
    pointer-events: none;
  }

  /* HERO — cream */
  .sec-hero    { height: 880px; background: #fdfaf5; }
  /* ABOUT — dark */
  .sec-about   { height: 820px; background: var(--dark); }
  /* SERVICES — cream */
  .sec-services{ height: 620px; background: #fdfaf5; }
  /* PROCESS — warm */
  .sec-process { height: 580px; background: #f0ebe0; }
  /* PROJECTS — dark */
  .sec-projects{ height: 420px; background: #1a1714; }
  /* CONTACT — cream */
  .sec-contact { height: 480px; background: #fdfaf5; }

  /* Logo ghost */
  .hero-logo {
    position: absolute;
    top: 100px; left: 72px;
    font-size: 110px;
    font-weight: 700;
    line-height: 0.86;
    color: rgba(0,0,0,0.06);
    letter-spacing: -3px;
    user-select: none;
    pointer-events: none;
  }
  .hero-logo em {
    display: block;
    font-style: italic;
    font-weight: 300;
    font-size: 38px;
    letter-spacing: 0.1em;
    margin-top: 14px;
    color: rgba(0,0,0,0.05);
  }

  /* ── COLLAGE LAYER ── */
  .collage-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 20;
  }

  /* ── SCRAP BASE ── */
  .s {
    position: absolute;
    pointer-events: auto;
    cursor: pointer;
    transition:
      transform 0.28s cubic-bezier(0.22,1,0.36,1),
      filter 0.28s ease;
  }
  .s img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }
  .s:hover {
    z-index: 999 !important;
    transform: var(--ht) scale(1.035) !important;
  }

  /* Torn edge clip-paths */
  .tr  { clip-path: polygon(0 0, 97% 1%, 100% 19%, 98% 43%, 100% 62%, 97% 80%, 100% 100%, 0 100%); }
  .tl  { clip-path: polygon(3% 0, 100% 0, 100% 100%, 2% 100%, 0 82%, 3% 60%, 0 39%, 2% 17%); }
  .ta  { clip-path: polygon(2% 1%, 98% 0%, 100% 97%, 96% 100%, 3% 99%, 0% 96%, 1% 3%); }
  .tc  { clip-path: polygon(0 0, 94% 0, 100% 6%, 100% 100%, 6% 100%, 0 94%); }
  .tb  { clip-path: polygon(0 0, 100% 0, 100% 97%, 93% 100%, 50% 98%, 7% 100%, 0 97%); }
  .tir { clip-path: polygon(0 0, 97% 3%, 100% 100%, 3% 97%); } /* irregular quad */

  /* Tape */
  .tape-t::before {
    content:''; position:absolute; z-index:2;
    top:-9px; left:22%; width:56%; height:20px;
    background: rgba(255,255,210,0.48);
    border: 0.5px solid rgba(200,190,140,0.3);
    transform: rotate(-1deg);
  }
  .tape-l::before {
    content:''; position:absolute; z-index:2;
    left:-9px; top:18%; width:20px; height:52%;
    background: rgba(255,255,210,0.48);
    border: 0.5px solid rgba(200,190,140,0.3);
    transform: rotate(1.2deg);
  }

  /* ── TOOLBAR ── */
  .toolbar {
    position: fixed; top:0; left:0; right:0; height:40px;
    background: rgba(23,20,16,0.92);
    backdrop-filter: blur(8px);
    display:flex; align-items:center; padding:0 20px; gap:20px;
    z-index:1000;
    border-bottom:1px solid #2a2520;
    font-size:10px; letter-spacing:0.15em; text-transform:uppercase;
    font-family:'Courier New',monospace; color:#555;
  }
  .toolbar .t { color:#b89a6e; }
  .toolbar .n { color:#333; font-size:9px; margin-left:auto; }

  /* ── INSPECTOR PANEL ── */
  .panel {
    position:fixed; bottom:16px; right:16px;
    background:rgba(23,20,16,0.9); backdrop-filter:blur(8px);
    border:1px solid #2a2520; padding:14px 16px;
    z-index:1000; font-family:'Courier New',monospace;
    font-size:9px; color:#555; min-width:200px;
  }
  .panel .p-title { color:#b89a6e; margin-bottom:10px; font-size:10px; }
  .cr { display:flex; align-items:center; gap:8px; margin-bottom:5px; }
  .cr label { color:#444; min-width:54px; }
  .cr input[type=range] { accent-color:#b89a6e; flex:1; }
  .cr .v { color:#b89a6e; min-width:42px; text-align:right; }
  .hint { color:#333; font-size:8px; margin-top:8px; line-height:1.7; }
</style>
</head>

<div class="panel" id="panel">

    <input type="range" id="c-top" min="0" max="4000" step="8" value="0">
    <span class="v" id="v-top">—</span></div>

  <div class="cr"><label>Horiz %</label>
    <input type="range" id="c-lr" min="-10" max="100" step="1" value="0">
    <span class="v" id="v-lr">—</span></div>

  <div class="cr"><label>Width vw</label>
    <input type="range" id="c-w" min="8" max="60" step="1" value="20">
    <span class="v" id="v-w">—</span></div>

  <div class="cr"><label>Height px</label>
    <input type="range" id="c-h" min="60" max="900" step="10" value="300">
    <span class="v" id="v-h">—</span></div>

  <div class="cr"><label>Rotation</label>
    <input type="range" id="c-rot" min="-20" max="20" step="0.5" value="0">
    <span class="v" id="v-rot">—</span></div>

  <div class="cr"><label>Z-layer</label>
    <input type="range" id="c-z" min="20" max="60" step="1" value="25">
    <span class="v" id="v-z">—</span></div>

  <div class="hint">Click to pin · values logged to console</div>
</div>

<script>
let active = null, pinned = false;

const scraps = [...document.querySelectorAll('.s')];

// Extract rotation from transform string (ignores translateX)
function getRot(el) {
  const m = el.style.transform.match(/rotate\(([-\d.]+)deg\)/);
  return m ? +m[1] : 0;
}
// Detect right-anchored
function isRight(el) { return !!el.style.right && !el.style.left; }
function getH(el) { return parseFloat(el.style.left || el.style.right) || 0; }
function getW(el) { return parseFloat(el.style.width) || 20; }

function sync(el) {
  if (!el) return;
  document.getElementById('panel-title').textContent = el.dataset.name || el.id;

  const top  = parseFloat(el.style.top) || 0;
  const lr   = getH(el);
  const w    = getW(el);
  const h    = parseFloat(el.style.height) || 300;
  const rot  = getRot(el);
  const z    = parseInt(el.style.zIndex) || 25;

  document.getElementById('c-top').value  = top;   document.getElementById('v-top').textContent = top + 'px';
  document.getElementById('c-lr').value   = lr;    document.getElementById('v-lr').textContent  = lr + '%' + (isRight(el) ? ' R' : ' L');
  document.getElementById('c-w').value    = w;     document.getElementById('v-w').textContent   = w + 'vw';
  document.getElementById('c-h').value    = h;     document.getElementById('v-h').textContent   = h + 'px';
  document.getElementById('c-rot').value  = rot;   document.getElementById('v-rot').textContent = rot + '°';
  document.getElementById('c-z').value    = z;     document.getElementById('v-z').textContent   = z;
}

function apply(el) {
  if (!el) return;
  const top = +document.getElementById('c-top').value;
  const lr  = +document.getElementById('c-lr').value;
  const w   = +document.getElementById('c-w').value;
  const h   = +document.getElementById('c-h').value;
  const rot = +document.getElementById('c-rot').value;
  const z   = +document.getElementById('c-z').value;

  el.style.top = top + 'px';
  if (isRight(el)) { el.style.right = Math.abs(lr) + '%'; el.style.left = ''; }
  else             { el.style.left  = lr + '%';            el.style.right = ''; }
  el.style.width   = w + 'vw';
  el.style.height  = h + 'px';
  el.style.zIndex  = z;

  // Preserve translateX if present, replace rotate
  const base = el.style.transform.includes('translateX') ? `translateX(-50%) rotate(${rot}deg)` : `rotate(${rot}deg)`;
  el.style.transform = base;
  el.style.setProperty('--ht', base);

  document.getElementById('v-top').textContent = top + 'px';
  document.getElementById('v-lr').textContent  = lr + '%' + (isRight(el) ? ' R' : ' L');
  document.getElementById('v-w').textContent   = w + 'vw';
  document.getElementById('v-h').textContent   = h + 'px';
  document.getElementById('v-rot').textContent = rot + '°';
  document.getElementById('v-z').textContent   = z;

  console.log(`%c[${el.dataset.name}] top:${top}px  ${isRight(el)?'right':'left'}:${lr}%  w:${w}vw  h:${h}px  rot:${rot}°  z:${z}`, 'color:#b89a6e');
}

scraps.forEach(el => {
  el.addEventListener('mouseenter', () => {
    if (!pinned) { active = el; sync(el); }
  });
  el.addEventListener('mouseleave', () => {
    if (!pinned) {
      active = null;
      document.getElementById('panel-title').textContent = 'Hover an image to adjust';
    }
  });
  el.addEventListener('click', e => {
    e.stopPropagation();
    if (pinned && active === el) {
      pinned = false; el.style.outline = '';
    } else {
      scraps.forEach(s => s.style.outline = '');
      active = el; pinned = true;
      el.style.outline = '2px solid #b89a6e';
      sync(el);
    }
  });
});

document.body.addEventListener('click', () => {
  if (pinned) { pinned = false; scraps.forEach(s => s.style.outline = ''); active = null; }
});

['c-top','c-lr','c-w','c-h','c-rot','c-z'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => { if (active) apply(active); });
});
</script>
</body>
</html>
